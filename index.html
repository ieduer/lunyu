<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI論語</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 將整體頁面劃分為左右兩欄 -->
  <div id="container">
    <!-- 左側：側邊欄 -->
    <aside id="sidebar">
      <!-- 切換顯示/隱藏目錄按鈕 -->
     <button id="toggle-menu-btn">顯示目錄</button>
      <!-- 兩級目錄：第一級目錄 -->
      <nav id="chapter-menu" style="display: none;"></nav>
    </aside>

    <!-- 右側：主要內容 -->
    <div id="main-content">
      <header>
        <h1>AI論語</h1>
<!-- 夜晚模式切換按鈕，僅顯示月亮 icon -->
<button id="toggle-dark-btn" title="切換夜晚模式" style="font-size: 1.5rem; background: none; border: none; cursor: pointer;">🌓</button>
      </header>

      <!-- 用於顯示選中論語章節內容 -->
      <section id="chapter-content"></section>

      <!-- 互動對話窗口 -->
      <section id="dialogue-box">
        <div id="messages"></div>
        <div id="input-area">
          <!-- 三個互動入口 -->
          <button onclick="sendChoice(1)">孔子：我該如何解釋這句？</button>
          <button onclick="sendChoice(2)">Gemini AI：請給我現代解讀</button>
          <button onclick="showInput()">自由提問</button>
          <div id="custom-input" style="display:none;">
            <input type="text" id="userQuestion" placeholder="請輸入你的問題" />
            <button onclick="sendCustomQuestion()">送出</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <footer style="text-align:center; margin-top:20px;">
    <p>©Suen <a href="https://bdfz.net/posts/lunyu">About</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
