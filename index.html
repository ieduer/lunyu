<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="https://raw.githubusercontent.com/gptv/suen/main/images/Avatar-small.jpeg" type="image/jpeg">
  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>AI論語</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- Fixed Top Bar -->
  <div id="top-bar">
    <button id="toggle-menu-btn" class="ghibli-button">顯示目錄</button>
    <header>
      <h1>AI論語</h1>
      <!-- Dark Mode Button moved inside header for positioning context -->
      <button id="toggle-dark-btn" title="切換夜晚模式" class="ghibli-button icon-button">🌓</button>
    </header>
  </div>

  <!-- Main Container (pushes down below top-bar) -->
  <div id="container">
    <!-- 左側：側邊欄 -->
    <aside id="sidebar">
      <!-- 目錄容器 (Level 1 items added by JS) -->
      <nav id="chapter-menu" style="display: none;"></nav>
    </aside>

    <!-- 右側：主要內容 -->
    <div id="main-content">
      <!-- Header removed from here, moved to top-bar -->
      <!-- 互動對話窗口 -->
      <section id="dialogue-box" class="ghibli-dialogue">
        <div id="messages">
            <!-- Initial content added by JS -->
        </div>
        <!-- Input area only contains the Yang button now -->
        <div id="input-area">
          <button id="btn-yang" onclick="handleYangAnnotationClick()" class="ghibli-button interaction-button" disabled>楊伯峻「論語譯註」</button>
          <!-- Gemini button removed -->
        </div>
         <!-- 用戶輸入區域 (預設隱藏) -->
         <div id="user-input-area" style="display:none;" class="ghibli-input-area">
            <textarea id="user-input" placeholder="請輸入你的問題，與孔子深入對話..." rows="3"></textarea>
            <button id="send-input-btn" onclick="handleUserInput()" class="ghibli-button send-button">發送</button>
          </div>
      </section>
    </div> <!-- End #main-content -->
  </div> <!-- End #container -->

  <footer>
    <p>©Suen <a href="https://bdfz.net/posts/lunyu" target="_blank" rel="noopener noreferrer">About</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
