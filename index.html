<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>論語2025</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <h1>論語2025</h1>
    <!-- 目錄區 -->
    <nav id="chapter-menu"></nav>
    <div id="progress">進度：0%</div>
  </header>

  <main>
    <!-- 隨機顯示一條論語（僅顯示正文，供初始載入用） -->
    <section id="random-analect">
      <p id="random-text"></p>
    </section>

    <!-- 用來顯示點選章節的具體內容 -->
    <section id="chapter-content"></section>

    <!-- 互動對話窗口 -->
    <section id="dialogue-box">
      <div id="messages"></div>
      <div id="input-area">
        <!-- 三個互動入口 -->
        <button onclick="sendChoice(1)">孔子：我該如何解釋這句？</button>
        <button onclick="sendChoice(2)">Gemini AI：請給我現代解讀</button>
        <button onclick="showInput()">自由提問</button>
        <div id="custom-input" style="display:none;">
          <input type="text" id="userQuestion" placeholder="請輸入你的問題" />
          <button onclick="sendCustomQuestion()">送出</button>
        </div>
      </div>
    </section>
  </main>

  <footer style="text-align:center; margin-top:20px;">
    <p>© bdfz suen</p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
