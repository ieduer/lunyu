<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>論語2025</title>
  <!-- 引入外部樣式表 -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <h1>論語2025</h1>
    <!-- 目錄顯示/隱藏按鈕 -->
    <button id="toggle-menu-btn">顯示目錄</button>
    <!-- 章節目錄（預設隱藏，透過 JS 切換顯示） -->
    <nav id="chapter-menu" style="display: none;"></nav>
  </header>

  <main>
    <!-- 用於顯示選中論語章節內容 -->
    <section id="chapter-content"></section>

    <!-- 互動對話窗口 -->
    <section id="dialogue-box">
      <div id="messages"></div>
      <div id="input-area">
        <!-- 三個互動入口 -->
        <button onclick="sendChoice(1)">孔子：我該如何解釋這句？</button>
        <button onclick="sendChoice(2)">Gemini AI：請給我現代解讀</button>
        <button onclick="showInput()">自由提問</button>
        <div id="custom-input" style="display:none;">
          <input type="text" id="userQuestion" placeholder="請輸入你的問題" />
          <button onclick="sendCustomQuestion()">送出</button>
        </div>
      </div>
    </section>
  </main>

  <footer style="text-align:center; margin-top:20px;">
    <p>© bdfz suen</p>
  </footer>

  <!-- 主程式 -->
  <script src="assets/js/app.js"></script>
  <script>
    // 監聽「顯示目錄」按鈕，切換目錄顯示/隱藏
    document.addEventListener("DOMContentLoaded", () => {
      const toggleMenuBtn = document.getElementById("toggle-menu-btn");
      const chapterMenu = document.getElementById("chapter-menu");

      toggleMenuBtn.addEventListener("click", () => {
        if (chapterMenu.style.display === "none") {
          chapterMenu.style.display = "flex";
          toggleMenuBtn.textContent = "隱藏目錄";
        } else {
          chapterMenu.style.display = "none";
          toggleMenuBtn.textContent = "顯示目錄";
        }
      });
    });
  </script>
</body>
</html>
