<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《論語互動遊戲》</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- 論語原文展示區 -->
  <div id="analects-text">
    <p>子曰：「學而時習之，不亦說乎？」</p>
  </div>

  <!-- 互動對話窗口 -->
  <div id="dialogue-box">
    <div id="messages"></div>
    <div id="input-area">
      <!-- 三個互動入口 -->
      <button onclick="sendChoice(1)">孔子：我該如何解釋這句？</button>
      <button onclick="sendChoice(2)">Gemini AI：請給我現代解讀</button>
      <button onclick="showInput()">自由提問</button>
      <div id="custom-input" style="display:none;">
        <input type="text" id="userQuestion" placeholder="請輸入你的問題">
        <button onclick="sendCustomQuestion()">送出</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
